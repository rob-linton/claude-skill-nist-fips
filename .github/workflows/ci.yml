name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate-skill + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned actions per CONTRIBUTING.md supply-chain policy.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install pytest (stdlib + pytest only)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest

      - name: Run validate-skill.py
        run: python3 tools/validate-skill.py

      - name: Run pytest
        run: python3 -m pytest tests/ -v

      - name: Reproducibility check — rebuild data and diff
        # If build-data.py produces different output than what's committed,
        # fail the build. This enforces the "prose is generated from data"
        # rule from CONTRIBUTING.md.
        run: |
          python3 tools/build-data.py
          git diff --exit-code data/ context/NistControlCatalogue.md

  lint-markdown:
    name: markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install markdownlint-cli2
        # Pinned to a specific minor version known to accept GitHub-Flavored
        # Markdown; update via Dependabot.
        run: npm install -g markdownlint-cli2@0.13.0

      - name: Lint
        run: |
          markdownlint-cli2 \
            'README.md' 'MAINTENANCE.md' 'CONTRIBUTING.md' \
            'SECURITY.md' 'CODE_OF_CONDUCT.md' 'CHANGELOG.md' \
            'SKILL.md' \
            'context/*.md' \
            'workflows/*.md' \
            'commands/*.md' \
            'agents/*.md' \
            || echo "markdown lint returned warnings — not blocking v0.1"
